trading:
  min_discount_percent: 45      # Минимальный ROI — прибыль к вложенному (%)
  min_price_usd: 0.04            # Минимальная цена предмета (USD)
  max_price_usd: 1            # Максимальная цена предмета (USD)
  max_single_purchase_usd: 1  # Макс. бюджет на одну покупку (USD)
  daily_limit_usd: 100.0          # Дневной лимит трат (USD)
  stop_balance_usd: 0.10          # Остановить при остатке ниже (USD)
  max_same_item_count: 15         # Макс. штук одного предмета за 24ч
  min_sales_volume_7d: 40      # Мин. продаж за 7 дней (ликвидность)
  dry_run: true                   # true = симуляция без реальных покупок
  semi_auto: false                # true = подтверждение покупки через Telegram

fees:
  steam_fee_percent: 15.0         # Общая комиссия Steam Market (справочно)
  steam_valve_fee_percent: 5.0    # Комиссия Valve (мин. $0.01)
  steam_game_fee_percent: 10.0    # Комиссия разработчика игры (мин. $0.01)
  cs2dt_fee_percent: 0.0          # Комиссия CS2DT
  c5game_fee_percent: 2.5         # Комиссия C5Game
  usd_to_cny_rate: 6.87      # Курс USD/CNY (для конвертации C5Game цен)

monitoring:
  interval_seconds: 300           # Интервал опроса рынка (5 минут)
  price_history_days: 30          # Хранить историю цен N дней
  new_listing_check: true         # Следить за новыми листингами

anti_manipulation:
  max_price_growth_2w_percent: 30 # Максимальный рост цены за 2 нед. (%)
  min_sales_at_current_price: 5   # Мин. продаж по текущей цене (±20%)
  max_spike_ratio: 2.0            # Макс. рост средней за 3 дня vs 27 дней
  max_price_cv: 0.5               # Макс. коэффициент вариации цены
  max_price_to_median_ratio: 2.0  # Макс. отношение цены листинга к медиане 30д
  min_steam_listings: 15          # Мин. листингов на Steam Market
  # Проверка buy order (реальный спрос)
  max_spread_ratio_cheap: 3.0     # Макс. листинг/buy_order для предметов <= cheap_price_threshold
  max_spread_ratio_normal: 2.0    # Макс. листинг/buy_order для предметов > cheap_price_threshold
  cheap_price_threshold: 0.15     # Граница "дешёвого" предмета (USD)
  require_buy_orders: true        # Отклонять если нет buy orders вообще

scoring:
  min_volume_30d: 50              # Мин. продаж за 30д (нет данных → не покупать)
  min_sell_probability: 90        # Мин. вероятность прибыльной продажи (%)
  min_concentration: 40           # Мин. концентрация продаж в полосе ±20% (%)
  min_profit_margin: 20           # Мин. прибыль при расчёте break-even (%)
  analysis_period_days: 30        # Период анализа истории продаж (дней)
  learning_mode: true             # true = логировать решения, но не переключать

safety:
  max_purchases_per_hour: 80      # Лимит покупок в час (kill switch)
  balance_anomaly_percent: 20     # Аномалия: баланс упал на >20% за цикл
  circuit_breaker_threshold: 5    # Ошибок подряд до отключения API
  circuit_breaker_timeout_min: 5  # Минут паузы после отключения

update_queue:
  scanner_interval_seconds: 900   # 15 мин
  buyer_interval_seconds: 60      # 1 мин
  freshness_candidate_minutes: 30
  freshness_normal_hours: 2
  freshness_low_hours: 6
  full_history_interval_hours: 24
  enricher_interval_seconds: 5    # 5 сек между батчами обогащения

notifications:
  quiet_mode: false               # true = только критические алерты
  daily_report_time: "09:00"      # Время ежедневного отчёта (UTC+3)
  events:
    purchase_success: true
    purchase_error: true
    low_balance: true
    daily_limit_reached: true
    api_unavailable: true
    good_deal_found: false

games:
  - app_id: 570
    name: "Dota 2"
    enabled: true
  - app_id: 730
    name: "CS2"
    enabled: false

blacklist:
  items: []                       # market_hash_name предметов

whitelist:
  enabled: false
  items: []                       # {name: "Item Name", max_price_usd: 3.0}
